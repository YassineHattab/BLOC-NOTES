<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPad Cloud - Organisé par IP</title>
    <style>
        :root { --primary: #2563eb; --bg: #ffffff; --text: #1f2937; --surface: #f3f4f6; --accent: #f59e0b; }
        @media (prefers-color-scheme: dark) { :root { --bg: #111827; --text: #f9fafb; --surface: #1f2937; } }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--surface); display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin: 20px 0 10px 0; color: var(--primary); letter-spacing: 1px; }
        .screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 0 20px 20px 20px; }
        .screen.active { display: flex; }
        .note-item { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border-left: 4px solid transparent; }
        .my-note { border-left-color: var(--primary); background: rgba(37, 99, 235, 0.05); }
        .editor-input { border: none; outline: none; background: transparent; color: var(--text); font-size: 1.5rem; font-weight: bold; width: 100%; margin-top: 10px; }
        .editor-textarea { flex: 1; border: none; outline: none; background: transparent; color: var(--text); font-size: 1.1rem; line-height: 1.6; resize: none; margin-top: 15px; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body>

<div id="screen-list" class="screen active">
    <header>
        <div style="font-weight: 800; color: var(--primary);">ProPad Cloud</div>
        <div id="user-ip" style="font-size: 0.7rem; opacity: 0.5;">Détection IP...</div>
    </header>
    <div id="notes-container" style="padding-bottom: 90px;">
        </div>
    <button class="fab" id="add-btn">+</button>
</div>

<div id="screen-editor" class="screen">
    <div style="padding: 15px 0;"><button id="close-btn" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer;">← Retour</button></div>
    <input type="text" id="note-title" class="editor-input" placeholder="Titre">
    <textarea id="note-content" class="editor-textarea" placeholder="Votre message..."></textarea>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // --- GARDEZ VOS PARAMÈTRES FIREBASE ICI ---
    const firebaseConfig = {
        apiKey: "AIzaSyCp68lJaNETkr72qfbKTfq3zmsB8lW3GUY",
        authDomain: "propad-cloud.firebaseapp.com",
        databaseURL: "https://propad-cloud-default-rtdb.firebaseio.com",
        projectId: "propad-cloud",
        storageBucket: "propad-cloud.firebasestorage.app",
        messagingSenderId: "994982289876",
        appId: "1:994982289876:web:8d3df786d784cfa6ec7641"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let notes = [];
    let currentId = null;
    let userIP = "Inconnu";

    // Récupérer l'adresse IP publique via un service gratuit
    fetch('https://api.ipify.org?format=json')
        .then(response => response.json())
        .then(data => {
            userIP = data.ip;
            document.getElementById('user-ip').innerText = "Mon IP : " + userIP;
            render();
        });

    onValue(ref(db, 'notes/'), (snapshot) => {
        const data = snapshot.val();
        notes = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
        render();
    });

    function render() {
        const container = document.getElementById('notes-container');
        container.innerHTML = '';

        // Séparer les notes de l'utilisateur et les autres
        const myNotes = notes.filter(n => n.ip === userIP).sort((a,b) => b.timestamp - a.timestamp);
        const otherNotes = notes.filter(n => n.ip !== userIP).sort((a,b) => b.timestamp - a.timestamp);

        // Section : MES NOTES
        if (myNotes.length > 0) {
            container.innerHTML += `<div class="section-title">Mes Pages (${userIP})</div>`;
            myNotes.forEach(n => container.appendChild(createNoteUI(n, true)));
        }

        // Section : AUTRES UTILISATEURS
        if (otherNotes.length > 0) {
            container.innerHTML += `<div class="section-title">Pages des autres</div>`;
            otherNotes.forEach(n => container.appendChild(createNoteUI(n, false)));
        }
    }

    function createNoteUI(n, isMine) {
        const div = document.createElement('div');
        div.className = `note-item ${isMine ? 'my-note' : ''}`;
        div.onclick = () => openNote(n.id);
        div.innerHTML = `
            <div style="font-weight:bold">${n.title || 'Sans titre'}</div>
            <div style="font-size:0.75rem; opacity:0.6; margin-top:5px;">Posté par ${isMine ? 'Moi' : n.ip} - ${n.dateStr || ''}</div>
            ${isMine ? `<button style="color:red; background:none; border:none; padding:10px 0; cursor:pointer;" onclick="event.stopPropagation(); window.del('${n.id}')">Supprimer</button>` : ''}
        `;
        return div;
    }

    window.del = (id) => { if(confirm("Supprimer cette note ?")) remove(ref(db, 'notes/' + id)); };

    function openNote(id) {
        currentId = id;
        const n = notes.find(x => x.id === id);
        document.getElementById('note-title').value = n.title || '';
        document.getElementById('note-content').value = n.content || '';
        document.getElementById('screen-list').classList.remove('active');
        document.getElementById('screen-editor').classList.add('active');
    }

    function save() {
        if (currentId) {
            update(ref(db, 'notes/' + currentId), {
                title: document.getElementById('note-title').value,
                content: document.getElementById('note-content').value,
                timestamp: Date.now(),
                ip: userIP, // On enregistre l'IP avec la note
                dateStr: new Date().toLocaleDateString('fr-FR')
            });
        }
    }

    document.getElementById('add-btn').onclick = () => {
        const newId = Date.now().toString();
        set(ref(db, 'notes/' + newId), { title: '', content: '', ip: userIP, timestamp: Date.now(), dateStr: new Date().toLocaleDateString('fr-FR') });
        openNote(newId);
    };

    document.getElementById('close-btn').onclick = () => {
        save();
        document.getElementById('screen-editor').classList.remove('active');
        document.getElementById('screen-list').classList.add('active');
    };

    document.getElementById('note-title').oninput = save;
    document.getElementById('note-content').oninput = save;
</script>
</body>
</html>
