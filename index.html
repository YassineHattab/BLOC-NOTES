<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPad Cloud - Global</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --text: #1f2937;
            --surface: #f3f4f6;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #111827; --text: #f9fafb; --surface: #1f2937; }
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--surface); }
        .app-title { font-weight: 800; color: var(--primary); font-size: 1.2rem; }
        .cloud-status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; opacity: 0.8; }
        #sync-dot { height: 7px; width: 7px; background: var(--success); border-radius: 50%; }
        .search-container { padding: 10px 20px; }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--surface); color: var(--text); outline: none; box-sizing: border-box; }
        .screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 0 20px 20px 20px; }
        .screen.active { display: flex; }
        .note-item { background: var(--surface); padding: 15px; border-radius: 12px; margin-top: 12px; border-left: 5px solid transparent; cursor: pointer; }
        .note-item.pinned { border-left-color: var(--accent); }
        .actions { display: flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.05); }
        .action-btn { background: none; border: none; font-size: 0.8rem; cursor: pointer; color: var(--primary); font-weight: bold; }
        .editor-header { display: flex; justify-content: space-between; padding: 10px 0; align-items: center; }
        .editor-input { border: none; outline: none; background: transparent; color: var(--text); font-size: 1.5rem; font-weight: bold; width: 100%; margin-top: 10px; }
        .editor-textarea { flex: 1; border: none; outline: none; background: transparent; color: var(--text); font-size: 1.1rem; line-height: 1.6; resize: none; margin-top: 15px; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

<div id="screen-list" class="screen active">
    <header>
        <div class="app-title">ProPad Cloud</div>
        <div class="cloud-status"><div id="sync-dot"></div> Live Global</div>
    </header>
    <div class="search-container">
        <input type="text" id="search-input" class="search-bar" placeholder="🔍 Rechercher dans le cloud...">
    </div>
    <div id="notes-container" style="padding-bottom: 90px;"></div>
    <button class="fab" id="add-btn">+</button>
</div>

<div id="screen-editor" class="screen">
    <div class="editor-header">
        <button id="close-btn" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer;">← Retour</button>
        <div id="sync-label" style="font-size: 0.7rem; opacity: 0.5;">En attente</div>
    </div>
    <input type="text" id="note-title" class="editor-input" placeholder="Titre de la note">
    <textarea id="note-content" class="editor-textarea" placeholder="Note publique..."></textarea>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Tes informations récupérées sur ton écran Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCp68lJaNETkr72qfbKTfq3zmsB8lW3GUY",
        authDomain: "propad-cloud.firebaseapp.com",
        databaseURL: "https://propad-cloud-default-rtdb.firebaseio.com",
        projectId: "propad-cloud",
        storageBucket: "propad-cloud.firebasestorage.app",
        messagingSenderId: "994982289876",
        appId: "1:994982289876:web:8d3df786d784cfa6ec7641"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let notes = [];
    let currentId = null;

    const container = document.getElementById('notes-container');
    const searchInput = document.getElementById('search-input');

    // Écoute en temps réel
    onValue(ref(db, 'notes/'), (snapshot) => {
        const data = snapshot.val();
        notes = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
        render();
    });

    function render() {
        const query = searchInput.value.toLowerCase();
        container.innerHTML = '';
        const filtered = notes.filter(n => 
            (n.title && n.title.toLowerCase().includes(query)) || 
            (n.content && n.content.toLowerCase().includes(query))
        ).sort((a,b) => b.timestamp - a.timestamp);

        filtered.forEach(n => {
            const div = document.createElement('div');
            div.className = `note-item ${n.pinned ? 'pinned' : ''}`;
            div.onclick = () => openNote(n.id);
            div.innerHTML = `
                <div style="font-weight:bold">${n.pinned ? '📌 ' : ''}${n.title || 'Sans titre'}</div>
                <div style="font-size:0.8rem; opacity:0.6; margin:5px 0;">${n.dateStr || ''}</div>
                <div class="actions">
                    <button class="action-btn" onclick="event.stopPropagation(); window.togglePinCloud('${n.id}', ${n.pinned})">${n.pinned ? 'Détacher' : 'Épingler'}</button>
                    <button class="action-btn" style="color:var(--danger)" onclick="event.stopPropagation(); window.deleteCloud('${n.id}')">Supprimer</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function openNote(id) {
        currentId = id;
        const n = notes.find(x => x.id === id);
        document.getElementById('note-title').value = n.title || '';
        document.getElementById('note-content').value = n.content || '';
        document.getElementById('screen-list').classList.remove('active');
        document.getElementById('screen-editor').classList.add('active');
    }

    function saveToCloud() {
        if (currentId) {
            update(ref(db, 'notes/' + currentId), {
                title: document.getElementById('note-title').value,
                content: document.getElementById('note-content').value,
                timestamp: Date.now(),
                dateStr: new Date().toLocaleDateString('fr-FR')
            });
            document.getElementById('sync-label').innerText = "Synchronisé";
        }
    }

    window.deleteCloud = (id) => { if(confirm("Supprimer pour tous ?")) remove(ref(db, 'notes/' + id)); };
    window.togglePinCloud = (id, status) => update(ref(db, 'notes/' + id), { pinned: !status });

    document.getElementById('add-btn').onclick = () => {
        const newId = Date.now().toString();
        set(ref(db, 'notes/' + newId), { title: '', content: '', timestamp: Date.now(), dateStr: new Date().toLocaleDateString('fr-FR'), pinned: false });
        openNote(newId);
    };

    document.getElementById('close-btn').onclick = () => {
        saveToCloud();
        document.getElementById('screen-editor').classList.remove('active');
        document.getElementById('screen-list').classList.add('active');
    };

    document.getElementById('note-title').oninput = saveToCloud;
    document.getElementById('note-content').oninput = saveToCloud;
    searchInput.oninput = render;
</script>
</body>
</html>
