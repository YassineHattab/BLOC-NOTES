<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPad Premium - Marwa</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --text: #1f2937;
            --surface: #f3f4f6;
            --accent: #f59e0b;
            --danger: #ef4444;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #111827; --text: #f9fafb; --surface: #1f2937; }
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--surface); }
        .screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 20px; }
        .screen.active { display: flex; }

        /* Style des notes */
        .note-item { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 12px; position: relative; border-left: 5px solid transparent; }
        .note-item.pinned { border-left-color: var(--accent); background: rgba(245, 158, 11, 0.05); }
        .note-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .note-title-text { font-weight: bold; font-size: 1.1rem; max-width: 70%; }
        
        /* Menu d'actions */
        .actions { display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 10px; }
        .action-btn { background: none; border: none; font-size: 0.8rem; cursor: pointer; color: var(--primary); font-weight: 600; padding: 5px; }
        .action-btn.delete { color: var(--danger); }
        .action-btn.pin { color: var(--accent); }

        .editor-input { border: none; outline: none; background: transparent; color: var(--text); font-size: 1.4rem; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .editor-textarea { flex: 1; border: none; outline: none; background: transparent; color: var(--text); font-size: 1.1rem; line-height: 1.6; resize: none; }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }
        .pin-icon { font-size: 0.9rem; margin-right: 5px; }
    </style>
</head>
<body>

<div id="screen-list" class="screen active">
    <header>
        <div style="font-weight: 800; color: var(--primary);">ProPad Pro</div>
        <div id="sync-status" style="font-size: 0.7rem; opacity: 0.5;">Auto-sync actif</div>
    </header>
    <div id="notes-container" style="margin-top:20px; padding-bottom: 80px;"></div>
    <button class="fab" onclick="createNewNote()">+</button>
</div>

<div id="screen-editor" class="screen">
    <header>
        <button onclick="backToList()" style="background:none; border:none; color:var(--primary); font-size:1.1rem; cursor:pointer;">← Retour</button>
        <div id="save-label" style="font-size:0.7rem; opacity:0.5;">Enregistré</div>
    </header>
    <input type="text" id="note-title" class="editor-input" placeholder="Titre...">
    <textarea id="note-content" class="editor-textarea" placeholder="Contenu de la note..."></textarea>
</div>

<script>
    let notes = JSON.parse(localStorage.getItem('proPad_v2')) || [];
    let currentId = null;

    function save() {
        if (currentId) {
            const index = notes.findIndex(n => n.id === currentId);
            if (index !== -1) {
                notes[index].title = document.getElementById('note-title').value;
                notes[index].content = document.getElementById('note-content').value;
                notes[index].updated = new Date().toLocaleString('fr-FR');
                notes[index].timestamp = Date.now();
                localStorage.setItem('proPad_v2', JSON.stringify(notes));
                document.getElementById('save-label').innerText = "Synchronisé";
            }
        }
    }

    function createNewNote() {
        const newNote = { 
            id: Date.now(), 
            title: '', 
            content: '', 
            updated: new Date().toLocaleString('fr-FR'),
            timestamp: Date.now(),
            pinned: false 
        };
        notes.push(newNote);
        openNote(newNote.id);
    }

    function openNote(id) {
        currentId = id;
        const note = notes.find(n => n.id === id);
        document.getElementById('note-title').value = note.title;
        document.getElementById('note-content').value = note.content;
        document.getElementById('screen-list').classList.remove('active');
        document.getElementById('screen-editor').classList.add('active');
    }

    function backToList() {
        save();
        document.getElementById('screen-editor').classList.remove('active');
        document.getElementById('screen-list').classList.add('active');
        render();
    }

    function togglePin(id, e) {
        e.stopPropagation();
        const index = notes.findIndex(n => n.id === id);
        notes[index].pinned = !notes[index].pinned;
        localStorage.setItem('proPad_v2', JSON.stringify(notes));
        render();
    }

    function deleteNote(id, e) {
        e.stopPropagation();
        if(confirm("Supprimer cette note ?")) {
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('proPad_v2', JSON.stringify(notes));
            render();
        }
    }

    function shareNote(id, e) {
        e.stopPropagation();
        const note = notes.find(n => n.id === id);
        const textToCopy = `📌 ${note.title || 'Sans titre'}\n📅 ${note.updated}\n\n${note.content}`;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("Contenu et date copiés dans le presse-papier !");
        });
    }

    function render() {
        const container = document.getElementById('notes-container');
        container.innerHTML = '';
        
        // Trier : d'abord les épinglés, puis par date
        const sortedNotes = [...notes].sort((a, b) => {
            if (a.pinned === b.pinned) return b.timestamp - a.timestamp;
            return a.pinned ? -1 : 1;
        });

        sortedNotes.forEach(n => {
            const div = document.createElement('div');
            div.className = `note-item ${n.pinned ? 'pinned' : ''}`;
            div.onclick = () => openNote(n.id);
            div.innerHTML = `
                <div class="note-header">
                    <div class="note-title-text">${n.pinned ? '📌 ' : ''}${n.title || 'Note sans titre'}</div>
                    <div style="font-size:0.7rem; opacity:0.5">${n.updated.split(' ')[0]}</div>
                </div>
                <div style="font-size:0.85rem; opacity:0.7; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">
                    ${n.content || 'Aucun contenu...'}
                </div>
                <div class="actions">
                    <button class="action-btn pin" onclick="togglePin(${n.id}, event)">${n.pinned ? 'Désépingler' : 'Épingler'}</button>
                    <button class="action-btn" onclick="shareNote(${n.id}, event)">Copier & Partager</button>
                    <button class="action-btn delete" onclick="deleteNote(${n.id}, event)">Supprimer</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    document.getElementById('note-title').addEventListener('input', () => {
        document.getElementById('save-label').innerText = "Enregistrement...";
        save();
    });
    document.getElementById('note-content').addEventListener('input', () => {
        document.getElementById('save-label').innerText = "Enregistrement...";
        save();
    });

    window.onload = render;
</script>

</body>
</html>
